name: Coda Tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  coda-tests:
    name: Mock and real Coda API tests
    runs-on: ubuntu-latest
    env:
      CODA_TEST_API_TOKEN: ${{ secrets.CODA_TEST_API_TOKEN }}
      CODA_TEST_DOC_ID: ${{ secrets.CODA_TEST_DOC_ID }}
      USE_MERGED_VCPKG_MANIFEST: "1"
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      GEN: ninja
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up VCPKG
        run: |
          make setup-vcpkg
          if [ "$(git -C vcpkg rev-parse --is-shallow-repository)" = "true" ]; then
            git -C vcpkg fetch --unshallow --tags
          fi

      - name: Check Coda test secrets
        run: |
          test -n "$CODA_TEST_API_TOKEN"
          test -n "$CODA_TEST_DOC_ID"

      - name: Run mocked Coda API tests
        run: make test_coda_http_mock

      - name: Run real Coda API tests
        run: make test_coda_http_real
